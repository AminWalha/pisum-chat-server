<!-- PISUM Chat Widget — paste this before </body> in any HTML page -->
<!-- Replace CHAT_SERVER_URL with your Render URL -->
<style>
#pisum-chat-btn{
  position:fixed;bottom:24px;right:24px;width:56px;height:56px;
  background:#2563eb;border-radius:50%;border:none;cursor:pointer;
  box-shadow:0 4px 16px rgba(37,99,235,0.4);z-index:9999;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s,background 0.2s;
}
#pisum-chat-btn:hover{background:#1d4ed8;transform:scale(1.08)}
#pisum-chat-btn svg{width:26px;height:26px;fill:white}

#pisum-chat-box{
  position:fixed;bottom:92px;right:24px;width:360px;
  background:#fff;border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.15);
  border:1px solid #e5e7eb;z-index:9999;
  display:none;flex-direction:column;overflow:hidden;
  font-family:'Inter',-apple-system,sans-serif;
}
#pisum-chat-header{
  background:#2563eb;color:#fff;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
#pisum-chat-header span{font-weight:600;font-size:0.95rem}
#pisum-chat-close{background:none;border:none;color:#fff;cursor:pointer;font-size:1.2rem;line-height:1;padding:0}
#pisum-chat-messages{
  height:320px;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  background:#f9fafb;
}
.pisum-msg{max-width:82%;padding:9px 13px;border-radius:12px;font-size:0.85rem;line-height:1.5}
.pisum-msg.bot{background:#fff;border:1px solid #e5e7eb;color:#111827;align-self:flex-start;border-bottom-left-radius:3px}
.pisum-msg.user{background:#2563eb;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.pisum-msg.typing{color:#6b7280;font-style:italic}
#pisum-chat-input-row{
  display:flex;padding:10px;gap:8px;border-top:1px solid #e5e7eb;background:#fff;
}
#pisum-chat-input{
  flex:1;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;
  font-size:0.85rem;font-family:inherit;outline:none;resize:none;
}
#pisum-chat-input:focus{border-color:#2563eb}
#pisum-chat-send{
  background:#2563eb;color:#fff;border:none;border-radius:8px;
  padding:8px 14px;cursor:pointer;font-size:0.85rem;font-weight:600;
  transition:background 0.15s;
}
#pisum-chat-send:hover{background:#1d4ed8}
#pisum-chat-send:disabled{opacity:0.5;cursor:not-allowed}
</style>

<!-- Chat button -->
<button id="pisum-chat-btn" onclick="pisumToggleChat()" title="Chat with PISUM Assistant">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</button>

<!-- Chat box -->
<div id="pisum-chat-box">
  <div id="pisum-chat-header">
    <span>PISUM Assistant</span>
    <button id="pisum-chat-close" onclick="pisumToggleChat()">✕</button>
  </div>
  <div id="pisum-chat-messages">
    <div class="pisum-msg bot">Hi! I'm the PISUM assistant. How can I help you today?</div>
  </div>
  <div id="pisum-chat-input-row">
    <input id="pisum-chat-input" placeholder="Ask a question…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();pisumSend()}"/>
    <button id="pisum-chat-send" onclick="pisumSend()">Send</button>
  </div>
</div>

<script>
const PISUM_CHAT_URL = 'https://YOUR-RENDER-URL.onrender.com';
const pisumSessionId = 'sess_' + Math.random().toString(36).slice(2);

function pisumToggleChat() {
  const box = document.getElementById('pisum-chat-box');
  box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
  if (box.style.display === 'flex') document.getElementById('pisum-chat-input').focus();
}

function pisumAddMsg(text, type) {
  const msgs = document.getElementById('pisum-chat-messages');
  const div = document.createElement('div');
  div.className = 'pisum-msg ' + type;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function pisumSend() {
  const input = document.getElementById('pisum-chat-input');
  const btn = document.getElementById('pisum-chat-send');
  const message = input.value.trim();
  if (!message) return;

  pisumAddMsg(message, 'user');
  input.value = '';
  btn.disabled = true;

  const typing = pisumAddMsg('Typing…', 'bot typing');

  try {
    const res = await fetch(PISUM_CHAT_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, sessionId: pisumSessionId }),
    });
    const data = await res.json();
    typing.remove();
    pisumAddMsg(data.reply || data.error, 'bot');
  } catch {
    typing.remove();
    pisumAddMsg('Connection error. Please try again.', 'bot');
  }

  btn.disabled = false;
  input.focus();
}
</script>
